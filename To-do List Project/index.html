<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS To-Do | Developer Edition 💻</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <header>
      <h1>💻 CS To-Do List</h1>
      <button id="theme-toggle" class="theme-btn">🌙</button>
    </header>

    <p class="subtitle">A clean, smart task tracker for coders 🚀</p>

    <div class="input-area">
      <input type="text" id="todo-input" placeholder="Type your next task and press Enter..." />
      <button id="add-btn">Add</button>
    </div>

    <div class="filter-area">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <ul id="todo-list" class="todo-list"></ul>

    <footer>
      <p class="footer-text">Built with 💻 HTML • CSS • JavaScript — for the next generation of coders 🚀</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
